modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"
issueTrackerURL = "https://github.com/stromblex/VartaPack/issues"

[[mods]]
modId = "vartapack"
version = "${version}"
displayName = "VartaPack"
description = '''
A lightweight multi-loader support toolkit for Minecraft modpacks.
Provides environment checks, mod validation, and one-click privacy-friendly support reports.
'''
authors = "stromblex"
logoFile = "assets/vartapack/icon.png"
displayURL = "https://github.com/stromblex/VartaPack"

[[dependencies.vartapack]]
modId = "neoforge"
type = "required"
versionRange = "[21.0,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.vartapack]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "CLIENT"
